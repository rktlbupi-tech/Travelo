<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hotels Selection</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .hotel-card { border-radius: 10px; }
    .hotel-card { transition: .2s; }
    .card.selected { background: #dff7df; border: 2px solid #3cb043; }

    .hotel-inner { display: flex; gap: 16px; padding: 14px; }
    .hotel-thumb { width: 150px; height: 100px; border-radius: 8px; overflow: hidden; }
    .hotel-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .hotel-body { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .price-pill { background:#f7f9fc; border-radius: 20px; padding: 6px 10px; font-weight: 700; }
  </style>
</head>

<body>
<a href="#" class="cgreen" data-bs-toggle="offcanvas" data-bs-target="#hotel-select">Change</a>

<section class="Hotel-booking">
	<div class="container">
		<div class="row">
			<div class="offcanvas offcanvas-end" id="hotel-select">
				<div class="offcanvas-header">
					<h4 class="offcanvas-title fw-bold">Change Hotel</h4>
					<button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
				</div>
				<div class="offcanvas-body">
					<div class="container my-4">
						
						<div class="d-flex align-items-center gap-4 flex-wrap mb-4">
							<!-- Star Rating -->
							<div>
								<label class="small fw-semibold d-block mb-1">Star Rating</label>
								<div class="btn-group" role="group">
									<button class="btn btn-outline-secondary btn-sm">3★</button>
									<button class="btn btn-outline-secondary btn-sm">4★</button>
									<button class="btn btn-outline-secondary btn-sm">5★</button>
								</div>
							</div>

							

							<!-- Hotel Type -->
							<div>
								<label class="small fw-semibold d-block mb-1">Hotel Type</label>
								<div class="booking-item">
								   <div class="bk-item booking-user">
									  <i class="far fa-user"></i>
									  <select class="wide w-100 pe-5">
										  <option value="01">Budget hotels</option>
										  <option value="02">3*</option>
										  <option value="03">4*</option>
										  <option value="04">5*</option>
										  <option value="05">Camps</option>
										  <option value="05">Homestay</option>
									 </select>
								   </div>
								</div>
								
							</div>
						</div>
	
						<!-- Hotel 1 -->
						<div class="card hotel-card mb-3">
						  <div class="hotel-inner">
						   <input class="form-check-input hotel-radio" type="radio" name="hotelSelect">
							<div class="hotel-thumb">
							  <img src="assets/images/hotel.png" class="img-fluid rounded-4" alt="Hotel">
							</div>

							<div class="hotel-body">
							  <div class="d-flex align-items-center gap-2">        
								<div>
								   <h5>3 Start Hotel</h5>
								   <div class="text-muted small">★★★</div>
								</div>
							  </div>

							  <small class="text-muted">Chow Kit · 1.7 km from WTC</small>
							  <i class="far fa-calendar-alt"></i> <small class="text-muted"> Fri, 26 Dec 2025 - Wed, 31 Dec 2025</small>
							  <small class="text-muted">Breakfast included</small>
							  <small class="text-muted">Room Type Superior Room</small>
							</div>

							<div class="text-end">
							  <div class="price-pill">+ ₹30</div>
							</div>
						  </div>
						</div>

						<!-- Hotel 2 -->
						<div class="card hotel-card mb-3">
							<div class="hotel-inner">
							<input class="form-check-input hotel-radio" type="radio" name="hotelSelect">
							<div class="hotel-thumb">
							  <img src="assets/images/hotel.png" class="img-fluid rounded-4" alt="Hotel">
							</div>

							<div class="hotel-body">
							  <div class="d-flex align-items-center gap-2">
								<div>
								  <h5>4 Start Hotel</h5>
								  <div class="text-muted small">★★★★</div>
								</div>
							  </div>

							  <small class="text-muted">KLCC · Near Central Market</small>
							  <i class="far fa-calendar-alt"></i> <small class="text-muted">Fri, 26 Dec 2025 - Wed, 31 Dec 2025</small>
							  <small class="text-muted">Breakfast included</small>
							  <small class="text-muted">Room Type Superior Room</small>
							</div>

							<div class="text-end">
							  <div class="price-pill">+ ₹79</div>
							</div>
						  </div>
						</div>

					  </div>

				</div>			
			</div>
		</div>
	</div>		
</section>

  
  <script>
    document.querySelectorAll('.hotel-radio').forEach(radio => {
      radio.addEventListener('change', function () {
        document.querySelectorAll('.hotel-card').forEach(card => card.classList.remove('selected'));
        radio.closest('.card').classList.add('selected');
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
